{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — FitLife Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'timetracking/css/style.css' %}" rel="stylesheet">
</head>
<body>
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;background:#f7f8fb;">
    <div class="login-card shadow-sm">
        <div class="text-center mb-3">
            <h2 class="fw-bold mb-1">FitLife Studio</h2>
            <div class="text-muted small" data-en="Time Tracker" data-de="Zeiterfassung">Time Tracker</div>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger py-2" data-en="Invalid credentials." data-de="Ungültige Anmeldedaten.">Invalid credentials.</div>
        {% endif %}
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" data-en="Username" data-de="Benutzername">Username</label>
                <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
                <label class="form-label" data-en="PIN / Password" data-de="PIN / Passwort">PIN / Password</label>
                <input type="password" name="password" id="pin-input" class="form-control" required>
            </div>
            <div class="pin-pad mb-3">
                {% for n in "1234567890" %}
                <button type="button" class="btn btn-outline-secondary pin-key" data-key="{{ n }}">{{ n }}</button>
                {% endfor %}
                <button type="button" class="btn btn-outline-warning pin-clear" data-en="Clear" data-de="Löschen">Clear</button>
            </div>
            <button type="submit" class="btn btn-primary w-100" data-en="Log in" data-de="Anmelden">Log in</button>
        </form>
        <div class="mt-3 text-center small text-muted">
            <div><span data-en="Employee" data-de="Mitarbeiter">Employee</span>: <code>lisa</code> / <code>1234</code></div>
            <div>HR: <code>hr</code> / <code>admin123</code></div>
        </div>
        <div class="mt-2 text-center">
            <div class="btn-group btn-group-sm">
                <button type="button" class="btn btn-outline-secondary lang-btn" data-lang="en">EN</button>
                <button type="button" class="btn btn-outline-secondary lang-btn" data-lang="de">DE</button>
            </div>
        </div>
    </div>
</div>
<script>
(function(){
    var inp=document.getElementById('pin-input');
    document.addEventListener('click',function(e){
        var k=e.target.closest('.pin-key');
        if(k){inp.value+=k.dataset.key;return;}
        if(e.target.closest('.pin-clear')){inp.value='';}
    });
})();
</script>
<script src="{% static 'timetracking/js/lang.js' %}"></script>
</body>
</html>
