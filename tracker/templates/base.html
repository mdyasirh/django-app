{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FitLife Studio – Time Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    .navbar { background-color: #16213e !important; }
    .card { background-color: #0f3460; border: none; }
    .table-dark { --bs-table-bg: #16213e; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .pulse { animation: pulse 1.5s infinite; }
    .btn-keypad { width: 70px; height: 70px; font-size: 1.5rem; margin: 4px; }
  </style>
</head>
<body class="bg-dark text-light">
  <nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">
        ⏱ <span data-en="FitLife Studio" data-de="FitLife Studio">FitLife Studio</span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <button id="langToggle" class="btn btn-sm btn-outline-light" onclick="toggleLang()">EN | DE</button>
        {% if user.is_authenticated %}
          <span class="text-light small">{{ user.get_full_name|default:user.username }}</span>
          <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger"
             data-en="Logout" data-de="Abmelden">Logout</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
